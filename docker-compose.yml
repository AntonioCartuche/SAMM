# SAMM + PostgreSQL + Prometheus + Grafana
# Uso: desde esta carpeta ejecutar `docker compose up --build`
#
# Puertos en el HOST (poco comunes, evitan choques con 8080/3000/5432/9090):
#   App:         http://localhost:42817
#   Grafana:     http://localhost:34109  (admin / admin por defecto)
#   Prometheus:  http://localhost:39044
#   Postgres:    localhost:35417  (si te conectas con DBeaver, etc.)
# Sobreescribe con variables: APP_PORT, GRAFANA_PORT, PROMETHEUS_PORT, POSTGRES_PORT
#
# Usuario demo: demo / SammDocker2026 (semilla en seed.sql).
# Registro: http://localhost:42817/register
# Si ya tenías un volumen postgres sin seed: docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: samm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-samm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-samm_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-samm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      # Usuario demo (ver docker/postgres/seed.sql)
      - ./docker/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "${POSTGRES_PORT:-35417}:5432"
    healthcheck:
      # Si cambias POSTGRES_USER/POSTGRES_DB, ajusta también este comando.
      test: ["CMD-SHELL", "pg_isready -U samm -d samm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: samm-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-42817}:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-samm}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-samm_dev_pass}
      DB_DATABASE: ${POSTGRES_DB:-samm}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}

  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: samm-prometheus
    depends_on:
      - app
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-39044}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h

  grafana:
    image: grafana/grafana:11.5.2
    container_name: samm-grafana
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-34109}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro

volumes:
  postgres_data:
  grafana_data:
